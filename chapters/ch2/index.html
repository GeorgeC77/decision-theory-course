<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>确定型决策分析 - 交互教学平台</title>
    <script type="module" crossorigin src="./assets/index-Byub_yxM.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Bn306i-z.css">
    <style>
      /* Hide the original navbar until we finish restyling it, to avoid the flash of the old version */
      nav {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function styleNavbar() {
          const nav = document.querySelector('nav');
          if (!nav) return false;

          // Make nav visible with the unified look
          nav.style.visibility = 'visible';
          nav.style.backgroundColor = '#1B3A5F';

          const inner = nav.querySelector('div');
          if (!inner) return true;
          inner.style.maxWidth = '1200px';
          inner.style.margin = '0 auto';
          inner.style.paddingLeft = '16px';
          inner.style.paddingRight = '16px';

          const flexWrap = inner.querySelector('div');
          if (flexWrap) {
            flexWrap.style.height = '64px'; // keep original h-16 to match existing content padding
            flexWrap.style.display = 'flex';
            flexWrap.style.alignItems = 'center';
            flexWrap.style.justifyContent = 'space-between';
          }

          // Brand link: first <a>
          const brandLink = nav.querySelector('a');
          if (brandLink) {
            brandLink.style.color = '#ffffff';
            brandLink.style.textDecoration = 'none';
            brandLink.style.fontSize = '14px';
            brandLink.style.fontWeight = '600';
            brandLink.style.display = 'inline-flex';
            brandLink.style.alignItems = 'center';
            brandLink.style.gap = '8px';
            const svg = brandLink.querySelector('svg');
            if (svg) {
              svg.style.color = '#ffffff';
              svg.style.width = '20px';
              svg.style.height = '20px';
            }
            const text = brandLink.querySelector('span');
            if (text) text.textContent = '决策理论与方法';
          }

          // Links container: second div inside the flex wrapper
          const linksContainer = flexWrap ? flexWrap.querySelector('div:last-child') : null;
          if (linksContainer) {
            linksContainer.style.display = 'flex';
            linksContainer.style.alignItems = 'center';
            linksContainer.style.gap = '4px';

            // Prepend "目录" back link
            const catalogLink = document.createElement('a');
            catalogLink.href = '../';
            catalogLink.className = 'kimi-ch2-nav-link';
            catalogLink.innerHTML =
              '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' +
              '<span>目录</span>';
            catalogLink.style.cssText =
              'display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:6px;' +
              'color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;text-decoration:none;' +
              'transition:background-color 0.15s,color 0.15s;';
            catalogLink.onmouseenter = function () {
              this.style.color = '#ffffff';
              this.style.backgroundColor = 'rgba(255,255,255,0.1)';
            };
            catalogLink.onmouseleave = function () {
              this.style.color = 'rgba(255,255,255,0.7)';
              this.style.backgroundColor = 'transparent';
            };
            linksContainer.insertBefore(catalogLink, linksContainer.firstChild);

            // Style section links: gold active -> white + underline
            Array.from(linksContainer.querySelectorAll('a')).forEach((link) => {
              if (link === catalogLink) return;
              link.style.cssText =
                'position:relative;display:inline-flex;align-items:center;height:32px;padding:0 12px;' +
                'border-radius:6px;font-size:13px;font-weight:500;text-decoration:none;' +
                'transition:background-color 0.15s,color 0.15s;';
              const isActive = link.style.color === 'rgb(200, 150, 62)' || getComputedStyle(link).color === 'rgb(200, 150, 62)';
              if (isActive) {
                link.style.color = '#ffffff';
                link.style.fontWeight = '500';
                const underline = document.createElement('span');
                underline.style.cssText =
                  'position:absolute;bottom:2px;left:12px;right:12px;height:2px;background:#ffffff;border-radius:1px;';
                link.appendChild(underline);
              } else {
                link.style.color = 'rgba(255,255,255,0.7)';
                link.onmouseenter = function () {
                  this.style.color = '#ffffff';
                  this.style.backgroundColor = 'rgba(255,255,255,0.1)';
                };
                link.onmouseleave = function () {
                  this.style.color = 'rgba(255,255,255,0.7)';
                  this.style.backgroundColor = 'transparent';
                };
              }
            });
          }

          return true;
        }

        function styleFooter() {
          const footer = document.querySelector('footer');
          if (!footer) return;
          footer.style.backgroundColor = '#ffffff';
          footer.style.borderTop = '1px solid #E0DDD5';
          footer.innerHTML =
            '<div style="max-width:1200px;margin:0 auto;padding:20px 16px;text-align:center;color:#6B6B6B;font-size:14px;">' +
            '决策理论与方法 · 第二章 确定型决策分析 · 交互教学平台' +
            '</div>';
        }

        function run() {
          if (styleNavbar()) {
            styleFooter();
          } else {
            // React hasn't rendered the nav yet; wait a bit
            setTimeout(run, 50);
          }
        }

        if (document.readyState !== 'loading') {
          run();
        } else {
          document.addEventListener('DOMContentLoaded', run);
        }
      })();
    </script>
  </body>
</html>
